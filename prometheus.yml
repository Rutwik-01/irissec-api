global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alert.rules.yml"

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: 'irissec-api'
    static_configs:
      - targets: ['irissec-prod:3000']
    metrics_path: '/metrics'
    scrape_interval: 15s
